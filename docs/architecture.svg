<svg width="1060" height="920" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <!-- Arrow markers -->
    <marker id="arrowBlack" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#424242"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E7D32"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6A1B9A"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565C0"/>
    </marker>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════════════
       CANVAS BACKGROUND
  ═══════════════════════════════════════════ -->
  <rect width="1060" height="920" fill="#F8F9FA" rx="0"/>

  <!-- ═══════════════════════════════════════════
       TITLE BLOCK
  ═══════════════════════════════════════════ -->
  <rect x="20" y="12" width="1020" height="52" rx="8" fill="#1A237E"/>
  <text x="530" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="white">SimpleTimeService — AWS Architecture</text>
  <text x="530" y="54" text-anchor="middle" font-size="12" fill="#90CAF9">project: particle41  ·  environment: production  ·  region: us-east-1</text>

  <!-- ═══════════════════════════════════════════
       INTERNET  (gray)
  ═══════════════════════════════════════════ -->
  <rect x="370" y="80" width="200" height="62" rx="10" fill="#546E7A" stroke="#37474F" stroke-width="2" filter="url(#shadow)"/>
  <text x="470" y="104" text-anchor="middle" font-size="20" fill="white">🌐</text>
  <text x="470" y="122" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Internet</text>
  <text x="470" y="137" text-anchor="middle" font-size="10" fill="#CFD8DC">HTTP :80</text>

  <!-- Arrow: Internet → ALB (vertical) -->
  <line x1="470" y1="142" x2="470" y2="230" stroke="#424242" stroke-width="2.5" marker-end="url(#arrowBlack)"/>

  <!-- ═══════════════════════════════════════════
       AWS REGION BOX  (orange dashed border)
  ═══════════════════════════════════════════ -->
  <rect x="20" y="155" width="1020" height="740" rx="12" fill="#FFFDE7" stroke="#FF9800" stroke-width="2" stroke-dasharray="10,5"/>
  <text x="40" y="176" font-size="11" font-weight="bold" fill="#E65100">AWS Region: us-east-1</text>

  <!-- ═══════════════════════════════════════════
       VPC BOX  (blue)
  ═══════════════════════════════════════════ -->
  <rect x="35" y="182" width="990" height="700" rx="10" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="55" y="200" font-size="11" font-weight="bold" fill="#0D47A1">VPC: particle41-production-vpc  |  CIDR: 10.0.0.0/16</text>

  <!-- ═══════════════════════════════════════════
       PUBLIC SUBNETS ROW  (green tinted)
  ═══════════════════════════════════════════ -->
  <rect x="55" y="208" width="950" height="158" rx="8" fill="#F1F8E9" stroke="#558B2F" stroke-width="1.5"/>
  <text x="75" y="226" font-size="10" font-weight="bold" fill="#33691E">PUBLIC SUBNETS  —  ALB and NAT Gateway live here</text>
  <text x="75" y="240" font-size="10" fill="#558B2F">us-east-1a: 10.0.0.0/20  |  us-east-1b: 10.0.16.0/20</text>

  <!-- ALB box (green) -->
  <rect x="75" y="248" width="380" height="105" rx="8" fill="#2E7D32" stroke="#1B5E20" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="265" y="270" text-anchor="middle" font-size="13" font-weight="bold" fill="white">⚖  Application Load Balancer</text>
  <text x="265" y="288" text-anchor="middle" font-size="11" fill="#C8E6C9">particle41-production-alb</text>
  <text x="265" y="305" text-anchor="middle" font-size="10" fill="#A5D6A7">Listener: HTTP :80</text>
  <text x="265" y="320" text-anchor="middle" font-size="10" fill="#A5D6A7">Target Group: particle41-production-tg</text>
  <text x="265" y="336" text-anchor="middle" font-size="10" fill="#A5D6A7">Health check: GET /health  ·  interval 30s</text>

  <!-- NAT Gateway box (blue) -->
  <rect x="620" y="248" width="220" height="105" rx="8" fill="#1565C0" stroke="#0D47A1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="730" y="270" text-anchor="middle" font-size="13" font-weight="bold" fill="white">⇄  NAT Gateway</text>
  <text x="730" y="290" text-anchor="middle" font-size="10" fill="#BBDEFB">Single gateway</text>
  <text x="730" y="306" text-anchor="middle" font-size="10" fill="#BBDEFB">Located in: us-east-1a</text>
  <text x="730" y="322" text-anchor="middle" font-size="10" fill="#BBDEFB">Outbound traffic for</text>
  <text x="730" y="338" text-anchor="middle" font-size="10" fill="#BBDEFB">private subnet tasks</text>

  <!-- IGW icon (small) -->
  <rect x="880" y="248" width="145" height="105" rx="8" fill="#0277BD" stroke="#01579B" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="952" y="270" text-anchor="middle" font-size="13" font-weight="bold" fill="white">↕  Internet GW</text>
  <text x="952" y="290" text-anchor="middle" font-size="10" fill="#B3E5FC">Attached to VPC</text>
  <text x="952" y="306" text-anchor="middle" font-size="10" fill="#B3E5FC">Inbound: internet → ALB</text>
  <text x="952" y="322" text-anchor="middle" font-size="10" fill="#B3E5FC">Outbound: via</text>
  <text x="952" y="338" text-anchor="middle" font-size="10" fill="#B3E5FC">NAT Gateway</text>

  <!-- ═══════════════════════════════════════════
       PRIVATE SUBNETS LABEL
  ═══════════════════════════════════════════ -->
  <text x="75" y="388" font-size="10" font-weight="bold" fill="#BF360C">PRIVATE SUBNETS  —  ECS Fargate tasks run here (no public IPs)</text>

  <!-- ═══════════════════════════════════════════
       PRIVATE SUBNET AZ1  (orange tinted)
  ═══════════════════════════════════════════ -->
  <rect x="55" y="394" width="470" height="468" rx="8" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="75" y="413" font-size="11" font-weight="bold" fill="#BF360C">AZ: us-east-1a  |  10.0.128.0/20</text>

  <!-- ECS Task box AZ1 (orange) -->
  <rect x="75" y="422" width="430" height="420" rx="8" fill="#FF6D00" stroke="#E65100" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="290" y="444" text-anchor="middle" font-size="12" font-weight="bold" fill="white">ECS Fargate Task</text>
  <text x="290" y="460" text-anchor="middle" font-size="10" fill="#FFE0B2">particle41-production  (256 CPU units · 512 MiB total)</text>

  <!-- Container: simpletimeservice (AZ1) -->
  <rect x="90" y="468" width="400" height="155" rx="6" fill="#E65100" stroke="#BF360C" stroke-width="1"/>
  <text x="290" y="488" text-anchor="middle" font-size="11" font-weight="bold" fill="white">simpletimeservice</text>
  <text x="290" y="504" text-anchor="middle" font-size="10" fill="#FFCCBC">nirdeshkumar02/simpletimeservice:0.0.4</text>
  <text x="290" y="520" text-anchor="middle" font-size="10" fill="#FFCCBC">FastAPI · uvicorn · Python 3.12-alpine</text>
  <text x="290" y="536" text-anchor="middle" font-size="10" fill="#FFCCBC">Port: 8080  |  User: nirdesh (UID 1000)</text>
  <text x="290" y="552" text-anchor="middle" font-size="10" fill="#FFCCBC">cpu=192  memory=384 MiB  (soft: 256 MiB)</text>
  <text x="290" y="568" text-anchor="middle" font-size="10" fill="#FFCCBC">Healthcheck: wget localhost:8080/health</text>
  <text x="290" y="584" text-anchor="middle" font-size="10" fill="#FFCCBC">Routes: GET /  ·  GET /health</text>
  <text x="290" y="600" text-anchor="middle" font-size="10" fill="#FFCCBC">Log driver: awsfirelens → Fluent Bit</text>

  <!-- Container: log_router / Fluent Bit (AZ1) -->
  <rect x="90" y="634" width="400" height="155" rx="6" fill="#6A1B9A" stroke="#4A148C" stroke-width="1"/>
  <text x="290" y="655" text-anchor="middle" font-size="11" font-weight="bold" fill="white">log_router  (Fluent Bit sidecar)</text>
  <text x="290" y="671" text-anchor="middle" font-size="10" fill="#E1BEE7">public.ecr.aws/aws-observability/</text>
  <text x="290" y="686" text-anchor="middle" font-size="10" fill="#E1BEE7">aws-for-fluent-bit:stable</text>
  <text x="290" y="702" text-anchor="middle" font-size="10" fill="#E1BEE7">cpu=64  memory=128 MiB  (soft: 64 MiB)</text>
  <text x="290" y="718" text-anchor="middle" font-size="10" fill="#E1BEE7">FireLens log router</text>
  <text x="290" y="734" text-anchor="middle" font-size="10" fill="#E1BEE7">Stream prefix: app/</text>
  <text x="290" y="750" text-anchor="middle" font-size="10" fill="#E1BEE7">Own logs → awslogs driver</text>
  <text x="290" y="766" text-anchor="middle" font-size="10" fill="#E1BEE7">Healthcheck: pgrep -x fluent-bit</text>

  <!-- ═══════════════════════════════════════════
       PRIVATE SUBNET AZ2  (orange tinted)
  ═══════════════════════════════════════════ -->
  <rect x="540" y="394" width="470" height="468" rx="8" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="560" y="413" font-size="11" font-weight="bold" fill="#BF360C">AZ: us-east-1b  |  10.0.144.0/20</text>

  <!-- ECS Task box AZ2 (orange) -->
  <rect x="560" y="422" width="430" height="420" rx="8" fill="#FF6D00" stroke="#E65100" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="775" y="444" text-anchor="middle" font-size="12" font-weight="bold" fill="white">ECS Fargate Task</text>
  <text x="775" y="460" text-anchor="middle" font-size="10" fill="#FFE0B2">particle41-production  (256 CPU units · 512 MiB total)</text>

  <!-- Container: simpletimeservice (AZ2) -->
  <rect x="575" y="468" width="400" height="155" rx="6" fill="#E65100" stroke="#BF360C" stroke-width="1"/>
  <text x="775" y="488" text-anchor="middle" font-size="11" font-weight="bold" fill="white">simpletimeservice</text>
  <text x="775" y="504" text-anchor="middle" font-size="10" fill="#FFCCBC">nirdeshkumar02/simpletimeservice:0.0.4</text>
  <text x="775" y="520" text-anchor="middle" font-size="10" fill="#FFCCBC">FastAPI · uvicorn · Python 3.12-alpine</text>
  <text x="775" y="536" text-anchor="middle" font-size="10" fill="#FFCCBC">Port: 8080  |  User: nirdesh (UID 1000)</text>
  <text x="775" y="552" text-anchor="middle" font-size="10" fill="#FFCCBC">cpu=192  memory=384 MiB  (soft: 256 MiB)</text>
  <text x="775" y="568" text-anchor="middle" font-size="10" fill="#FFCCBC">Healthcheck: wget localhost:8080/health</text>
  <text x="775" y="584" text-anchor="middle" font-size="10" fill="#FFCCBC">Routes: GET /  ·  GET /health</text>
  <text x="775" y="600" text-anchor="middle" font-size="10" fill="#FFCCBC">Log driver: awsfirelens → Fluent Bit</text>

  <!-- Container: log_router / Fluent Bit (AZ2) -->
  <rect x="575" y="634" width="400" height="155" rx="6" fill="#6A1B9A" stroke="#4A148C" stroke-width="1"/>
  <text x="775" y="655" text-anchor="middle" font-size="11" font-weight="bold" fill="white">log_router  (Fluent Bit sidecar)</text>
  <text x="775" y="671" text-anchor="middle" font-size="10" fill="#E1BEE7">public.ecr.aws/aws-observability/</text>
  <text x="775" y="686" text-anchor="middle" font-size="10" fill="#E1BEE7">aws-for-fluent-bit:stable</text>
  <text x="775" y="702" text-anchor="middle" font-size="10" fill="#E1BEE7">cpu=64  memory=128 MiB  (soft: 64 MiB)</text>
  <text x="775" y="718" text-anchor="middle" font-size="10" fill="#E1BEE7">FireLens log router</text>
  <text x="775" y="734" text-anchor="middle" font-size="10" fill="#E1BEE7">Stream prefix: app/</text>
  <text x="775" y="750" text-anchor="middle" font-size="10" fill="#E1BEE7">Own logs → awslogs driver</text>
  <text x="775" y="766" text-anchor="middle" font-size="10" fill="#E1BEE7">Healthcheck: pgrep -x fluent-bit</text>

  <!-- ═══════════════════════════════════════════
       CLOUDWATCH  (outside VPC, bottom right — purple)
  ═══════════════════════════════════════════ -->
  <!-- Connecting lines from Fluent Bit to CloudWatch -->
  <line x1="290" y1="789" x2="290" y2="832" stroke="#6A1B9A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowPurple)"/>
  <line x1="775" y1="789" x2="775" y2="832" stroke="#6A1B9A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowPurple)"/>
  <line x1="290" y1="855" x2="450" y2="855" stroke="#6A1B9A" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="775" y1="855" x2="620" y2="855" stroke="#6A1B9A" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- CloudWatch box (purple) -->
  <rect x="450" y="832" width="170" height="62" rx="8" fill="#6A1B9A" stroke="#4A148C" stroke-width="2" filter="url(#shadow)"/>
  <text x="535" y="852" text-anchor="middle" font-size="12" font-weight="bold" fill="white">☁  CloudWatch Logs</text>
  <text x="535" y="869" text-anchor="middle" font-size="10" fill="#E1BEE7">/ecs/particle41-production</text>
  <text x="535" y="884" text-anchor="middle" font-size="10" fill="#E1BEE7">Retention: 7 days</text>

  <!-- ═══════════════════════════════════════════
       S3 BACKEND  (bottom-left amber, outside VPC)
  ═══════════════════════════════════════════ -->
  <rect x="35" y="868" width="310" height="62" rx="8" fill="#F57F17" stroke="#E65100" stroke-width="2" filter="url(#shadow)"/>
  <text x="190" y="888" text-anchor="middle" font-size="12" font-weight="bold" fill="white">🗄  Terraform Remote State (S3)</text>
  <text x="190" y="905" text-anchor="middle" font-size="10" fill="#FFF9C4">Bucket: dev-nird-tf-bucket  (us-east-1)</text>
  <text x="190" y="920" text-anchor="middle" font-size="10" fill="#FFF9C4">Key: ecs/particle41/terraform.tfstate  ·  native S3 locking</text>

  <!-- Auto-scaling annotation (top-right of private subnets) -->
  <rect x="720" y="370" width="285" height="22" rx="4" fill="#E8EAF6" stroke="#3949AB" stroke-width="1"/>
  <text x="862" y="385" text-anchor="middle" font-size="10" fill="#1A237E">⟳ Auto Scaling: min=1 · max=5 · CPU target=60% · Mem target=60%</text>

  <!-- ═══════════════════════════════════════════
       TRAFFIC FLOW ARROWS
  ═══════════════════════════════════════════ -->
  <!-- ALB → AZ1 Task (arrow down-left) -->
  <path d="M 265 353 L 265 420" stroke="#2E7D32" stroke-width="2" fill="none" marker-end="url(#arrowGreen)" stroke-dasharray="6,3"/>
  <text x="220" y="388" font-size="9" fill="#1B5E20" transform="rotate(-90,220,388)">ALB → Task</text>

  <!-- ALB → AZ2 Task (arrow down-right) -->
  <path d="M 470 353 C 470 380, 775 380, 775 420" stroke="#2E7D32" stroke-width="2" fill="none" marker-end="url(#arrowGreen)" stroke-dasharray="6,3"/>

  <!-- NAT → Internet (outbound) -->
  <path d="M 730 248 L 730 195 L 800 150" stroke="#1565C0" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>

  <!-- app → log_router (internal dashed) -->
  <line x1="290" y1="623" x2="290" y2="634" stroke="#CE93D8" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="775" y1="623" x2="775" y2="634" stroke="#CE93D8" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- ═══════════════════════════════════════════
       LEGEND
  ═══════════════════════════════════════════ -->
  <rect x="720" y="832" width="315" height="76" rx="8" fill="white" stroke="#BDBDBD" stroke-width="1"/>
  <text x="877" y="850" text-anchor="middle" font-size="11" font-weight="bold" fill="#212121">Legend</text>

  <rect x="735" y="858" width="14" height="14" rx="3" fill="#1565C0"/>
  <text x="755" y="870" font-size="10" fill="#212121">Networking (VPC, Subnets, NAT, IGW)</text>

  <rect x="735" y="876" width="14" height="14" rx="3" fill="#FF6D00"/>
  <text x="755" y="888" font-size="10" fill="#212121">Compute (ECS Fargate Tasks)</text>

  <rect x="870" y="858" width="14" height="14" rx="3" fill="#2E7D32"/>
  <text x="890" y="870" font-size="10" fill="#212121">Load Balancing (ALB)</text>

  <rect x="870" y="876" width="14" height="14" rx="3" fill="#6A1B9A"/>
  <text x="890" y="888" font-size="10" fill="#212121">Observability (CloudWatch)</text>

  <!-- Circuit breaker badge -->
  <rect x="35" y="843" width="215" height="20" rx="4" fill="#E8F5E9" stroke="#43A047" stroke-width="1"/>
  <text x="142" y="857" text-anchor="middle" font-size="9" fill="#1B5E20">✓ Deployment circuit breaker + auto-rollback enabled</text>
</svg>
